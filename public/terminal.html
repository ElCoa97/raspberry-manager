<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/img/logo.png">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm/css/xterm.css">

    <style>
        body {
            background: black;
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        /* BARRA SUPERIOR */

        .navbar {
            background: #b11217;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            color: white;
            font-weight: bold;
            box-sizing: border-box;
        }

        /* TERMINAL */

        #terminal {
            height: calc(100vh - 50px);
            width: 100%;
        }
    </style>

</head>

<body>

    <div class="navbar">
        <span id="titleText">Terminal</span>
        <span id="terminalUser" style="font-weight: normal; font-size: 15px;">👤 Cargando...</span>
    </div>

    <div id="terminal"></div>

    <script src="https://cdn.jsdelivr.net/npm/xterm/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit/lib/xterm-addon-fit.js"></script>

    <script>

        /* obtener id */

        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");
        const finca = params.get("finca");

        /* colocar titulo */

        document.getElementById("titleText").innerText =
            (finca ? finca + " | " : "") + "Terminal - " + id;

        /* colocar usuario logueado */

        async function fetchSessionUser() {
            try {
                const res = await fetch("/api/me");
                if (res.status === 200) {
                    const data = await res.json();
                    if (data.user && data.user.username) {
                        document.getElementById("terminalUser").innerText = "👤 " + data.user.username;
                    }
                }
            } catch (e) { }
        }
        fetchSessionUser();

        /* terminal */

        const term = new Terminal({
            cursorBlink: true
        });

        const fitAddon = new FitAddon.FitAddon();

        term.loadAddon(fitAddon);

        term.open(document.getElementById("terminal"));

        fitAddon.fit();

        /* websocket */

        const protocol = location.protocol === "https:" ? "wss://" : "ws://";

        const ws = new WebSocket(protocol + location.host + "/terminal?id=" + id);

        ws.onmessage = (event) => {
            term.write(event.data);
        };

        ws.onopen = () => {
            ws.send(JSON.stringify({ type: "resize", cols: term.cols, rows: term.rows }));
        };

        term.onData(data => {
            ws.send(JSON.stringify({ type: "input", data: data }));
        });

        term.onResize(size => {
            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: "resize", cols: size.cols, rows: size.rows }));
            }
        });

        /* auto resize */

        window.addEventListener("resize", () => {
            fitAddon.fit();
        });

    </script>

</body>

</html>

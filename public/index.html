<!DOCTYPE html>
<html>

<head>

<title>Raspberry Manager</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet"
>

</head>

<body class="container">

<h2 class="mt-4">Raspberry Manager</h2>

<div class="row mb-3">

<div class="col">
<button class="btn btn-primary" onclick="addRaspberry()">
Agregar Raspberry
</button>
</div>

<div class="col">
<input
type="text"
class="form-control"
placeholder="Buscar Raspberry..."
onkeyup="buscarRaspberry(this.value)"
>
</div>

</div>

<div class="mb-3">

<span class="badge bg-success" id="onlineCount">Online: 0</span>
<span class="badge bg-danger" id="offlineCount">Offline: 0</span>

</div>

<table class="table table-bordered table-striped">

<thead>
<tr>
<th>ID</th>
<th>Estado</th>
<th>Última conexión</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

<script src="app.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>SIOMA - Gestión de Básculas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:Arial, Helvetica, sans-serif;
}

.login-container{
background:white;
padding:40px;
border-radius:10px;
width:380px;
box-shadow:0 0 20px rgba(0,0,0,0.1);
text-align:center;
}

.logo{
width:90px;
margin-bottom:10px;
}

.title{
font-size:22px;
font-weight:600;
color:#b11217;
margin-bottom:25px;
}

.btn-login{
background:#b11217;
border:none;
width:100%;
}

.btn-login:hover{
background:#8e0e12;
}

.forgot{
font-size:14px;
color:#6c757d;
text-decoration:none;
}

.forgot:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="login-container">

<img src="/img/logo.png" class="logo">

<div class="title">
Gestión de Básculas
</div>

<input id="user" class="form-control mb-3" placeholder="Usuario">

<input id="pass" type="password" class="form-control mb-2" placeholder="Contraseña">

<button class="btn btn-login text-white" onclick="login()">
Ingresar
</button>

</div>

<script>

async function login(){

const username=document.getElementById("user").value;
const password=document.getElementById("pass").value;

const res=await fetch("/api/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({username,password})
});

const data=await res.json();

if(data.success){

location.href="/";

}else{

alert("Credenciales incorrectas");

}

}

</script>

</body>
</html>
